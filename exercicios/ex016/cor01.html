<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradientes em CSS</title>
    <style> 
        * { /*Comentário, esse asterístico serve para configurações globais das CSS*/
            height: 100%;
        }
        body {
            background-image: linear-gradient(to bottom, #8903FB, #E900DF, #FF0649, #FE7600, #FFB800);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando Gradientes</h1>
</body>
</html>
