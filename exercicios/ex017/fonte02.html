<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com o Google fonts</title>
    <style>

        

        @import url('https://fonts.googleapis.com/css2?family=Ballet:opsz@16..72&family=Oswald:wght@200..700&display=swap');

        h1, h2 {
            
            font-optical-sizing: auto;
            font-size: 32px;
            color:black; 
            font-style: normal;
        }
        p {
            font-family: "Oswald", sans-serif;
            font-optical-sizing: auto;
            font-style: normal;
            color: gray;
            font-weight: normal;
        }
        .Oswald {
            font-family: "Ballet", cursive;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }
    </style>
</head>
<body>
    <uniquifier class="Oswald">
        <h1>Título</h1>
    </uniquifier>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Maxime hic dolorum eligendi itaque praesentium rerum aperiam facere libero accusantium,<br> perferendis magnam dicta eveniet unde ipsum? Molestiae quidem sint nihil hic!</p> 
    
</body>
</html>
